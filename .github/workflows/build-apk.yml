name: Build Jupyter-Style IDE APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool
        pip install --upgrade pip
        pip install --upgrade cython buildozer
    
    - name: Manually download and setup Android NDK
      run: |
        # Create NDK directory
        mkdir -p ~/.buildozer/android/platform/
        cd ~/.buildozer/android/platform/
        
        # Download NDK r27 (valid, complete URL)
        wget https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
        
        # Extract it
        unzip -q android-ndk-r27c-linux.zip
        
        # Rename to the expected folder name
        mv android-ndk-r27c android-ndk-27.0.11902837
        
        # Set the environment variable for Buildozer
        echo "ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-27.0.11902837" >> $GITHUB_ENV
        echo "ANDROID_NDK_VERSION=27.0.11902837" >> $GITHUB_ENV
    
    - name: Build APK
      run: |
        buildozer android debug
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: jupyter-ide-apk
        path: ./bin/*.apk
        if-no-files-found: error