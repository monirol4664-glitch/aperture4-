name: Build Mathematica Console APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Briefcase and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install briefcase toga sympy
    
    - name: Setup Java for Android
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
    
    - name: Create Briefcase project
      run: |
        briefcase new \
          --formal-name "Mathematica Console" \
          --bundle "org.mathematica" \
          --project-name "mathematica_console" \
          --description "Offline Mathematica-style math console" \
          --author "Your Name" \
          --author-email "your@email.com" \
          --license "MIT" \
          --no-input
    
    - name: Create app files
      run: |
        # Create the app directory structure
        mkdir -p src/mathematica_console/mathematica_console/resources
        
        # Create main app file
        cat > src/mathematica_console/mathematica_console/app.py << 'EOF'
        import toga
        from toga.style import Pack
        from toga.style.pack import COLUMN, ROW
        import sympy as sp
        from sympy import *
        import sys
        from io import StringIO
        
        class MathematicaConsole(toga.App):
            def startup(self):
                self.main_window = toga.MainWindow(title=self.formal_name)
                
                # Main container
                main_box = toga.Box(style=Pack(direction=COLUMN, padding=10))
                
                # Input area
                self.code_input = toga.MultilineTextInput(
                    style=Pack(flex=1, padding=(0, 0, 10, 0)),
                    placeholder="Enter mathematical expression...\n\nExamples:\n2 + 2\nx**2 + 3*x + 2\nintegrate(x**2, x)\ndiff(sin(x), x)\nsolve(x**2 - 4, x)\nlimit(sin(x)/x, x, 0)",
                    initial=""
                )
                
                # Buttons
                button_box = toga.Box(style=Pack(direction=ROW, padding=5))
                run_button = toga.Button("Evaluate", on_press=self.evaluate, style=Pack(padding=5, flex=1))
                clear_button = toga.Button("Clear", on_press=self.clear, style=Pack(padding=5, flex=1))
                
                button_box.add(run_button)
                button_box.add(clear_button)
                
                # Output area
                self.output_area = toga.MultilineTextInput(
                    style=Pack(flex=1, padding=(10, 0, 0, 0)),
                    readonly=True,
                    placeholder="Results will appear here..."
                )
                
                # Status bar
                self.status_label = toga.Label(
                    "Ready | SymPy " + sp.__version__,
                    style=Pack(padding=(5, 10, 5, 5), font_size=10)
                )
                
                # Add all to main box
                main_box.add(self.code_input)
                main_box.add(button_box)
                main_box.add(self.output_area)
                main_box.add(self.status_label)
                
                self.main_window.content = main_box
                self.main_window.show()
            
            def evaluate(self, widget):
                code = self.code_input.value.strip()
                if not code:
                    self.output_area.value = "Please enter an expression"
                    return
                
                self.status_label.text = "Evaluating..."
                
                # Capture stdout
                old_stdout = sys.stdout
                redirected_output = StringIO()
                sys.stdout = redirected_output
                
                try:
                    # Parse and evaluate the expression
                    expr = sp.sympify(code)
                    
                    # Simplify
                    simplified = sp.simplify(expr)
                    
                    # Try to get numerical value if possible
                    result = str(simplified)
                    
                    # Try to evaluate numerically for constants
                    try:
                        if not simplified.free_symbols:
                            numeric = float(simplified.evalf())
                            result += f"\n≈ {numeric}"
                    except:
                        pass
                    
                    self.output_area.value = f"In: {code}\n\nOut: {result}"
                    self.status_label.text = "Ready - Evaluation successful"
                    
                except Exception as e:
                    self.output_area.value = f"Error: {str(e)}"
                    self.status_label.text = "Ready - Error in evaluation"
                finally:
                    sys.stdout = old_stdout
            
            def clear(self, widget):
                self.code_input.value = ""
                self.output_area.value = ""
                self.status_label.text = "Ready - Cleared"
        
        def main():
            return MathematicaConsole()
        
        if __name__ == "__main__":
            app = main()
            app.main_loop()
        EOF
        
        # Create __init__.py
        cat > src/mathematica_console/mathematica_console/__init__.py << 'EOF'
        from .app import main
        
        __all__ = ['main']
        EOF
    
    - name: Update pyproject.toml
      run: |
        cat > pyproject.toml << 'EOF'
        [build-system]
        requires = ["briefcase"]
        build-backend = "briefcase.build"
        
        [tool.briefcase]
        project_name = "mathematica_console"
        bundle = "org.mathematica"
        version = "1.0.0"
        description = "Offline Mathematica-style math console"
        author = "Your Name"
        author_email = "your@email.com"
        license = "MIT"
        
        [tool.briefcase.app.mathematica_console]
        formal_name = "Mathematica Console"
        sources = ["src/mathematica_console"]
        requires = [
            "toga>=0.4.0",
            "sympy>=1.12",
        ]
        
        [tool.briefcase.app.mathematica_console.android]
        target_abis = ["arm64-v8a", "armeabi-v7a"]
        min_sdk = 21
        target_sdk = 33
        deployment = true
        
        [tool.briefcase.app.mathematica_console.macOS]
        requires = []
        
        [tool.briefcase.app.mathematica_console.windows]
        requires = []
        
        [tool.briefcase.app.mathematica_console.linux]
        requires = []
        EOF
    
    - name: Build Android APK
      run: |
        # Create Android platform
        briefcase create android
        
        # Build the APK
        briefcase build android
        
        # Package the APK
        briefcase package android
    
    - name: Find and rename APK
      run: |
        # Find the APK file
        APK_FILE=$(find . -name "*.apk" -type f | grep -v "unaligned" | head -n 1)
        if [ -n "$APK_FILE" ]; then
          cp "$APK_FILE" mathematica-console.apk
          echo "APK_FOUND=true" >> $GITHUB_ENV
          echo "APK_SIZE=$(du -h mathematica-console.apk | cut -f1)" >> $GITHUB_ENV
          echo "✅ APK created successfully!"
          ls -lh mathematica-console.apk
        else
          echo "APK_FOUND=false" >> $GITHUB_ENV
          echo "❌ APK not found"
          # List directories for debugging
          find . -name "*.apk" 2>/dev/null
          ls -la dist/ 2>/dev/null || echo "No dist directory"
          ls -la windows/ 2>/dev/null || echo "No windows directory"
          ls -la linux/ 2>/dev/null || echo "No linux directory"
          ls -la macos/ 2>/dev/null || echo "No macos directory"
        fi
    
    - name: Upload APK
      if: env.APK_FOUND == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: mathematica-console-apk
        path: mathematica-console.apk
        compression-level: 0
    
    - name: Create Release
      if: env.APK_FOUND == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        files: mathematica-console.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build Summary
      if: always()
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        if [ "${{ env.APK_FOUND }}" = "true" ]; then
          echo "✅ **APK built successfully!**" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** mathematica-console.apk" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** ${{ env.APK_SIZE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Download:** Check artifacts or releases" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Build failed - APK not created**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Debug Information:" >> $GITHUB_STEP_SUMMARY
          echo "- Check the build logs above for errors" >> $GITHUB_STEP_SUMMARY
          echo "- Make sure all dependencies are installed" >> $GITHUB_STEP_SUMMARY
        fi
