name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Create complete Flutter project with android folder
      run: |
        # Save your existing files
        cp -r lib lib_save
        cp pubspec.yaml pubspec_save.yaml
        
        # Create brand new Flutter project in a temp directory
        cd /tmp
        flutter create --platforms=android --org=com.yourapp myapp
        cd -
        
        # Copy the entire android folder from the new project
        cp -r /tmp/myapp/android .
        
        # Copy other necessary files
        cp /tmp/myapp/build.gradle ./ 2>/dev/null || true
        cp /tmp/myapp/settings.gradle ./ 2>/dev/null || true
        
        # Restore your app code
        rm -rf lib
        cp -r lib_save lib
        cp pubspec_save.yaml pubspec.yaml
        
        # Create local.properties
        which flutter | xargs dirname | xargs dirname > /tmp/flutter_path
        echo "flutter.sdk=$(cat /tmp/flutter_path)" > android/local.properties
        
        echo "✅ Project ready with android folder"
    
    - name: Verify structure
      run: |
        echo "Checking files:"
        ls -la
        echo ""
        echo "Android folder:"
        ls -la android/
        echo ""
        echo "Lib folder:"
        ls -la lib/
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/app-release.apk
