name: Build Flutter APK with Embedded Python

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Create Flutter project with android folder
      run: |
        cp -r lib lib_save
        cp pubspec.yaml pubspec_save.yaml
        cd /tmp
        flutter create --platforms=android --org=com.yourapp myapp
        cd -
        cp -r /tmp/myapp/android .
        rm -rf lib
        cp -r lib_save lib
        cp pubspec_save.yaml pubspec.yaml
    
    - name: Auto-Configure Gradle for Chaquopy
      run: |
        # Add Chaquopy Maven repo to project-level build.gradle
        sed -i '/mavenCentral()/a \        maven { url "https://chaquo.com/maven" }' android/build.gradle
        sed -i '/dependencies {/a \        classpath "com.chaquo.python:gradle:14.0.2"' android/build.gradle
        
        # Apply Chaquopy plugin in app-level build.gradle
        sed -i '/apply plugin: .com.android.application./a apply plugin: "com.chaquo.python"' android/app/build.gradle
        
        # Add Python configuration with NumPy (or any packages you want)
        sed -i '/defaultConfig {/a \        ndk { abiFilters "armeabi-v7a", "arm64-v8a" }\n        python {\n            buildPython "python3"\n            pip {\n                install "numpy"\n                install "pandas"\n            }\n        }' android/app/build.gradle
    
    - name: Set Android Manifest for Chaquopy
      run: |
        # Add PyApplication to AndroidManifest.xml
        sed -i 's/android:label=/android:name="com.chaquo.python.android.PyApplication" android:label=/' android/app/src/main/AndroidManifest.xml
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: python-ide
        path: build/app/outputs/flutter-apk/app-release.apk