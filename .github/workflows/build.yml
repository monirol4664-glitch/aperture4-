name: Build Math Tools APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        
    - name: Install MAUI for .NET 10
      run: dotnet workload install maui-android
      
    - name: Restore
      run: dotnet restore MathToolsApp.csproj
      
    - name: Build APK
      run: dotnet build MathToolsApp.csproj -c Release -f net10.0-android
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MathToolsApp
        path: '**/*.apk'