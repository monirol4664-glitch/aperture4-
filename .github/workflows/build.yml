name: Build with .NET 9

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Install Android Workload
      run: dotnet workload install android
    
    - name: Create and Build
      run: |
        dotnet new android -n MathematicaConsole
        cd MathematicaConsole
        
        # Update to .NET 9
        sed -i 's/net[0-9.]*-android/net9.0-android35/' MathematicaConsole.csproj
        
        dotnet build -c Release
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MathematicaConsole.apk
        path: MathematicaConsole/bin/Release/net9.0-android/*.apk
