name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Install .NET 8 (not the latest .NET 9 or 10)
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # Now install the MAUI workload for .NET 8
    - name: Install MAUI Workload
      run: dotnet workload install maui-android

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Android APK
      run: dotnet build -c Release -f net8.0-android --no-restore

    - name: Publish APK
      run: dotnet publish -f net8.0-android -c Release --no-build -o output

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: aperture4-apk
        path: |
          **/*.apk
          output/*.apk
