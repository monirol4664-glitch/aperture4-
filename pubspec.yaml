name: python_ide
description: Python IDE with Jupyter-style interface
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  
  # Code editing with syntax highlighting
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  
  # State management
  provider: ^6.1.1
  
  # File handling
  path_provider: ^2.1.1
  
  # HTTP for downloads
  dio: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
